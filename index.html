═══════════════════════════════════════ */
let _ctx;
function aC(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();return _ctx;}
function tone(fr,dl=0,dur=.08,tp='sine',vol=.15,atk=.005){
  try{
    const c=aC(),g=c.createGain(),o=c.createOscillator();
    o.type=tp;o.frequency.value=fr;
    g.gain.setValueAtTime(0,c.currentTime+dl);
    g.gain.linearRampToValueAtTime(vol,c.currentTime+dl+atk);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dl+dur);
    o.connect(g);g.connect(c.destination);
    o.start(c.currentTime+dl);o.stop(c.currentTime+dl+dur+.02);
  }catch(e){}
}
function noise(dl=0,dur=.15,vol=.1){
  try{
    const c=aC(),buf=c.createBuffer(1,c.sampleRate*.3,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const s=c.createBufferSource(),f=c.createBiquadFilter(),g=c.createGain();
    s.buffer=buf;f.type='bandpass';f.frequency.value=750;f.Q.value=.9;
    g.gain.setValueAtTime(0,c.currentTime+dl);
    g.gain.linearRampToValueAtTime(vol,c.currentTime+dl+.01);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dl+dur);
    s.connect(f);f.connect(g);g.connect(c.destination);
    s.start(c.currentTime+dl);s.stop(c.currentTime+dl+dur+.02);
  }catch(e){}
}

  tone(penta[(i+4)%8],.12,.10,'sine',.06);
}

/* ── mathematical fallback facts ── */
function _isPrime(n){
  if(n<2)return false; if(n<4)return true;
  if(n%2===0||n%3===0)return false;
  for(let i=5;i*i<=n;i+=6) if(n%i===0||n%(i+2)===0)return false;
  return true;
}
function _mathFact(n){
  if(n<0)
    return {text:`Negative numbers were controversial for centuries — Brahmagupta (628 AD) was first to formalise rules for negatives and zero.`,source:'Mathematical history'};
  const sqrt=Math.sqrt(n);
  if(Number.isInteger(sqrt)&&sqrt>1)
    return {text:`${n} is a perfect square — ${sqrt}² = ${n}. Perfect squares were a cornerstone of Pythagorean mathematics (~500 BC).`,source:'Number theory'};
  if(n>1&&(n&(n-1))===0){
    const exp=Math.log2(n);
    return {text:`${n} = 2^${exp}. Powers of two define digital computing — every byte, pixel and memory address is built on them.`,source:'Computing'};
  }
  if(_isPrime(n)&&n<1e6)
    return {text:`${n} is prime — divisible only by 1 and itself. Euclid proved infinitely many primes exist in his Elements (~300 BC).`,source:'Number theory'};
  if(n>10000)
    return {text:`Calculations of this scale would have taken hours by hand before Babbage's Difference Engine (1822) — the first mechanical computer.`,source:'Computing history'};
  const digits=String(n).split('').map(Number);
  if(digits.reduce((a,b)=>a+b,0)===n&&n>1)
    return {text:`${n} equals the sum of its own digits — a rare property explored in recreational mathematics.`,source:'Number theory'};
  return {text:`${n} — every integer holds hidden structure. Number theory, from Euclid to Ramanujan, reveals the patterns within.`,source:'Mathematics'};
}

function getFact(value){
  const v=parseFloat(value);
  if(!isFinite(v)) return null;
  const n=Math.round(v);
  const exact=fmtDisp(value);
  // exact match only — no nearby substitution
  if(FACTS[n]) return {exactNum:exact, num:n, ...FACTS[n]};
  // mathematical fallback about the exact number
  return {exactNum:exact, num:n, ..._mathFact(n)};
}

const CVSW=800, CVSH=270;
const dCvs = document.createElement('canvas');
dCvs.width=CVSW; dCvs.height=CVSH;
const dCtx = dCvs.getContext('2d');
const dTex = new THREE.CanvasTexture(dCvs);

function fmtDisp(val){
  if(val==='Error') return 'Error';
  const n=parseFloat(val);
  if(!isFinite(n)) return 'Error';
  if(Math.abs(n)>=1e12||(Math.abs(n)<1e-6&&n!==0)) return n.toExponential(4);
  const s=String(parseFloat(n.toPrecision(12)));
  const p=s.split('.');
  p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return p.join('.');
}
function wrapText(ctx,text,maxW){
  const words=text.split(' '), lines=[];
  let line='';
  for(const w of words){
    const t=line?line+' '+w:w;
    if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}
    else line=t;
  }
  if(line)lines.push(line);
  return lines;
}

  const al  = hasFact ? Math.min(1, age * 1.8) : 0;

  /* background */
  dCtx.fillStyle='#040c14';
  dCtx.fillRect(0,0,W,H);

  /* scanlines */
  for(let y=0;y<H;y+=3){
    dCtx.fillStyle='rgba(0,0,0,0.20)';
    dCtx.fillRect(0,y,W,1);

  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.52)');
  dCtx.fillStyle=vg;
  dCtx.fillRect(0,0,W,H);

  const rightEdge = hasFact ? SPLIT - 12 : W - 20;

  dCtx.shadowColor='#00ff88';
  dCtx.shadowBlur=22;
  dCtx.textAlign='right';
  dCtx.fillText(dispStr, rightEdge, 44 + fs * 0.86);
  dCtx.shadowBlur=0;

  /* ── RIGHT PANEL: fact (when present) ── */
  if(hasFact){
    /* vertical divider */
    const grd = dCtx.createLinearGradient(SPLIT, 10, SPLIT, H-10);

    grd.addColorStop(0.2, `rgba(0,255,110,${al*.45})`);
    grd.addColorStop(0.8, `rgba(0,255,110,${al*.45})`);
    grd.addColorStop(1,   `rgba(0,255,110,0)`);
    dCtx.strokeStyle=grd;
    dCtx.lineWidth=1;
    dCtx.beginPath();
    dCtx.moveTo(SPLIT, 10);
    dCtx.lineTo(SPLIT, H-10);
    dCtx.stroke();

    const RX = SPLIT + 16;   // right panel text origin x
    const RW = W - RX - 12;  // right panel available width

    /* label */
    dCtx.font='600 12px monospace';
    dCtx.fillStyle=`rgba(0,200,80,${al*.55})`;
    dCtx.textAlign='left';
    dCtx.fillText('── HISTORICAL CONTEXT ──', RX, 26);

    /* number badge — always show the exact computed result */
    const badge='[ '+(currentFact.exactNum ?? currentFact.num)+' ]';
    dCtx.font='700 30px monospace';
    dCtx.fillStyle=`rgba(255,220,60,${al})`;
    dCtx.shadowColor='rgba(255,200,0,0.6)';
    dCtx.shadowBlur=12;
    dCtx.fillText(badge, RX, 60);
    dCtx.shadowBlur=0;

    /* fact text */
    dCtx.font='400 17px monospace';
    dCtx.fillStyle=`rgba(190,255,210,${al*.88})`;
    const lines=wrapText(dCtx, currentFact.text, RW);
    let ly=88;
    for(const ln of lines.slice(0,7)){
      dCtx.fillText(ln, RX, ly);
      ly+=23;
    }

    /* source */
    if(currentFact.source){
      dCtx.font='italic 13px monospace';
      dCtx.fillStyle=`rgba(80,200,140,${al*.55})`;
      dCtx.textAlign='right';
      dCtx.fillText('— '+currentFact.source, W-12, H-10);
    }
  }

  /* ── CRT glitch effects ── */
  /* 1. Scanline flicker — ~15% of frames, darken random bands */
  if(Math.random()<0.15){
    const bands=2+Math.floor(Math.random()*3);
    for(let b=0;b<bands;b++){
      const sy=Math.floor(Math.random()*H);
      dCtx.fillStyle='rgba(0,0,0,0.25)';
      dCtx.fillRect(0,sy,W,2);
    }
  }

  /* 2. Horizontal slice displacement */
  if(glitchSlice>0){
    try{
      const imgData=dCtx.getImageData(0,glitchSliceY,W,glitchSliceH);
      dCtx.fillStyle='#040c14';
      dCtx.fillRect(0,glitchSliceY,W,glitchSliceH);
      dCtx.putImageData(imgData,glitchSliceDx,glitchSliceY);
    }catch(e){}
    glitchSlice--;
  } else if(Math.random()<0.008){
    glitchSlice=2+Math.floor(Math.random()*3);
    glitchSliceY=Math.floor(Math.random()*(H-30));
    glitchSliceH=10+Math.floor(Math.random()*20);
    glitchSliceDx=Math.floor((Math.random()-.5)*18);
  }

  /* 3. RGB colour split on result text */
  if(glitchRGB>0){
    dCtx.save();
    dCtx.globalCompositeOperation='lighter';
    dCtx.font=`700 ${hasFact?44:72}px monospace`;
    dCtx.textAlign='right';
    dCtx.fillStyle='rgba(255,40,40,0.12)';
    dCtx.fillText(fmtDisp(current), (hasFact?SPLIT-12:W-20)+3, 44+(hasFact?44:72)*0.86);
    dCtx.fillStyle='rgba(40,255,255,0.10)';
    dCtx.fillText(fmtDisp(current), (hasFact?SPLIT-12:W-20)-3, 44+(hasFact?44:72)*0.86);
    dCtx.restore();
    glitchRGB--;
  } else if(Math.random()<0.005){
    glitchRGB=2+Math.floor(Math.random()*3);
  }

  /* 4. Brightness flash */
  if(glitchFlash>0){
    dCtx.fillStyle='rgba(180,255,200,0.07)';
    dCtx.fillRect(0,0,W,H);
    glitchFlash--;
  } else if(Math.random()<0.003){
    glitchFlash=1+Math.floor(Math.random()*2);
  }

  dTex.needsUpdate=true;
}

/* ── Phase 6: procedural brushed-metal scratches via onBeforeCompile ── */
(()=>{
  /* World-position varying injected into vert + frag shaders */
  const vertDecl  = `varying vec3 vWP;`;
  const vertInject= `vWP = (modelMatrix * vec4(position,1.0)).xyz;`;
  const fragDecl  = `varying vec3 vWP;`;
  /* Horizontal hairline scratches injected AFTER metalnessmap_fragment
     so both roughnessFactor AND metalnessFactor are safely declared.
     Scratches → near-zero roughness + near-full metalness = bright mirror streaks. */
  const fragInject= `
    {
      float _s1 = step(.952, fract(vWP.y*68.0  + sin(vWP.x*105.0)*.85));
      float _s2 = step(.974, fract(vWP.y*188.0 + sin(vWP.x*255.0)*.38));
      float _s3 = step(.988, fract(vWP.y*395.0));
      float _sc = (_s1*.48 + _s2*.34 + _s3*.22) * .82;
      roughnessFactor = mix(roughnessFactor, .015, _sc);
      metalnessFactor = mix(metalnessFactor, .98,  _sc * .9);
    }
  `;
  for(const mat of [bodyMat, bodyDarkMat, bezelMat]){
    mat.onBeforeCompile = (sh) => {
      sh.vertexShader   = vertDecl + '\n' + sh.vertexShader
        .replace('#include <fog_vertex>',
                 `#include <fog_vertex>\n${vertInject}`);
      sh.fragmentShader = fragDecl + '\n' + sh.fragmentShader
        .replace('#include <metalnessmap_fragment>',
                 `#include <metalnessmap_fragment>\n${fragInject}`);
    };
    mat.needsUpdate = true;
  }
  /* Slightly richer tone for drama */
  renderer.toneMappingExposure = 1.05;
})();

/* ── Braided cable texture via onBeforeCompile ── */
(()=>{
  /* Cable materials have no maps so vUv isn't declared. Inject our own UV varying. */
  const cVertDecl  = `varying vec2 _cUV;`;
  const cVertInject= `_cUV = uv;`;  /* uv attribute always exists on TubeGeometry */
  const cFragDecl  = `varying vec2 _cUV;`;
  const cFragInject = `
    {
      /* Diamond-weave pattern: _cUV.x = along tube, _cUV.y = around circumference */
      float _cu = _cUV.x * 42.0;
      float _cv = _cUV.y * 6.2832;
      /* Two opposing helical sine waves create diamond weave */
      float _w1 = sin(_cu + _cv * 3.0);
      float _w2 = sin(_cu - _cv * 3.0);
      float _weave = abs(_w1 * _w2);
      float _groove = smoothstep(0.0, 0.45, _weave);
      diffuseColor.rgb *= mix(0.52, 1.0, _groove);
      /* Rubber ring connector segments */
      float _ring = 1.0 - step(0.92, fract(_cUV.x * 7.0));
      diffuseColor.rgb *= mix(0.72, 1.0, _ring);
    }
  `;
  const cRoughInject = `
    {
      float _cu2 = _cUV.x * 42.0;
      float _cv2 = _cUV.y * 6.2832;
      float _w = abs(sin(_cu2 + _cv2*3.0) * sin(_cu2 - _cv2*3.0));
      float _gr = smoothstep(0.0, 0.45, _w);
      roughnessFactor = mix(0.88, roughnessFactor, _gr);
    }
  `;
  for(const mat of [cableDark, cablePurple]){
    mat.onBeforeCompile = (sh) => {
      /* Inject UV varying into vertex shader */
      sh.vertexShader = cVertDecl + '\n' + sh.vertexShader
        .replace('#include <fog_vertex>',
                 `#include <fog_vertex>\n${cVertInject}`);
      /* Inject UV varying + texture code into fragment shader */
      sh.fragmentShader = cFragDecl + '\n' + sh.fragmentShader
        .replace('#include <color_fragment>',
                 `#include <color_fragment>\n${cFragInject}`)
        .replace('#include <roughnessmap_fragment>',
                 `#include <roughnessmap_fragment>\n${cRoughInject}`);
    };
    mat.needsUpdate = true;
  }
})();

/* USB-C port helper (thin rounded slot like MacBook side port) */
function makeUSBPort(x,y,z,rY=0,rZ=0){
  const g=new THREE.Group();
  /* Outer shell — rounded capsule shape */
  const shell=new THREE.Mesh(new THREE.BoxGeometry(.30,.10,.14),portShellMat);
  shell.rotation.z=rZ; g.add(shell);
  /* Inner cavity */
  const cav=new THREE.Mesh(new THREE.BoxGeometry(.22,.06,.10),portInnerMat);
  cav.rotation.z=rZ; cav.position.z=.03; g.add(cav);
  /* Tiny centre tongue */
  const tongue=new THREE.Mesh(new THREE.BoxGeometry(.16,.018,.08),
    new THREE.MeshPhysicalMaterial({color:0xdddde0,roughness:.6}));
  tongue.rotation.z=rZ; tongue.position.set(0,0,.02); g.add(tongue);
  g.position.set(x,y,z); g.rotation.y=rY;
  return g;
}
/* 3.5mm audio jack helper */
function makeJackPort(x,y,z,rY=0){
  const g=new THREE.Group();
  const ring=new THREE.Mesh(new THREE.CylinderGeometry(.065,.065,.12,12),portShellMat);
  ring.rotation.x=Math.PI/2; g.add(ring);
  const hole=new THREE.Mesh(new THREE.CylinderGeometry(.032,.032,.14,8),portInnerMat);
  hole.rotation.x=Math.PI/2; g.add(hole);
  g.position.set(x,y,z); g.rotation.y=rY;
  return g;
}
/* DC barrel power jack */
function makePowerJack(x,y,z,rY=0){
  const g=new THREE.Group();
  const barrel=new THREE.Mesh(new THREE.CylinderGeometry(.085,.085,.16,12),portInnerMat);
  barrel.rotation.x=Math.PI/2; g.add(barrel);
  const rim=new THREE.Mesh(new THREE.CylinderGeometry(.095,.095,.04,12),portShellMat);
  rim.rotation.x=Math.PI/2; rim.position.z=.06; g.add(rim);
  const pin=new THREE.Mesh(new THREE.CylinderGeometry(.018,.018,.18,6),portPinMat);
  pin.rotation.x=Math.PI/2; g.add(pin);
  g.position.set(x,y,z); g.rotation.y=rY;
  return g;
}
/* Small rectangular port (mini-DIN / serial) */
function makeMiniPort(x,y,z,w,h,rY=0){
  const g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.BoxGeometry(w+.04,h+.04,.10),portShellMat));

  inn.position.z=.02; g.add(inn);
  g.position.set(x,y,z); g.rotation.y=rY;
  return g;
}

  {label:'0',  action:'num',  arg:'0',color:'purple', r:3,c:1},
  {label:'±',  action:'sign', color:'green',  r:3,c:2},
  {label:'=',  action:'eq',            color:'green', r:3,c:3,wide:true},
];

/* ── vintage stepped keycap geometry ── */
// Rim: full key footprint, thin (sits in keyboard surface depression)
const rimGeoN  = new RoundedBoxGeometry(KEY_W,        KEY_H,        RIM_D,  3, .03);
const rimGeoW  = new RoundedBoxGeometry(KEY_W*2+GAP,  KEY_H,        RIM_D,  3, .03);
// Cap: inset on all sides, classic SA-profile heavy bevel
const capGeoN  = new RoundedBoxGeometry(KEY_W -2*INSET, KEY_H-2*INSET, KEY_D, 4, .052);
const capGeoW  = new RoundedBoxGeometry(KEY_W*2+GAP-2*INSET, KEY_H-2*INSET, KEY_D, 4, .052);

/* local Z offsets inside group (group origin = cap centre) */
const CAP_Z  =  0;                            //  cap centre (group origin)
const RIM_Z  = -(KEY_D + RIM_D) / 2;          // -0.13  rim centre
const LBL_Z  =  KEY_D/2 + .015;               // raised above key surface

function makeLabel(text, color='#3a3a42'){
  const c=document.createElement('canvas'); c.width=256;c.height=200;
  const x=c.getContext('2d');
  x.clearRect(0,0,256,200);
  x.font='bold 100px "Space Mono", monospace';
  x.textAlign='center'; x.textBaseline='middle';
  const isLight = color==='#ffffff' || color==='#fff';
  x.shadowColor = isLight ? 'rgba(0,0,0,.4)' : 'rgba(0,0,0,.22)';
  x.shadowOffsetX=0; x.shadowOffsetY=1; x.shadowBlur= isLight ? 5 : 3;
  x.fillStyle=color;
  x.fillText(text,128,105);
  const tex = new THREE.CanvasTexture(c);
  tex.generateMipmaps = false;
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  return tex;
}

const keyObjects=[], hitMeshes=[];

for(const def of KEY_DEFS){
  const isGreen = def.color==='green';
  const wide    = !!def.wide;

  const x = wide ? GRIX + def.c*CELL_W + (KEY_W+GAP)/2
                 : GRIX + def.c*CELL_W;
  const y = GRIY - def.r*CELL_H;

  /* Group acts as the animatable "mesh" */
  const group = new THREE.Group();
  group.position.set(x, y, BASE_Z);
  calcGroup.add(group);

  /* Rim / socket — dark near-black base */
  const rim = new THREE.Mesh(wide?rimGeoW:rimGeoN, kRimMat.clone());
  rim.position.set(0, 0, RIM_Z);
  rim.castShadow=true;
  group.add(rim);

  /* Keycap — coloured matte ABS */
  const capMat = (isGreen ? kGreen : kPurple).clone();
  const cap = new THREE.Mesh(wide?capGeoW:capGeoN, capMat);
  cap.position.set(0, 0, CAP_Z);
  cap.castShadow=true;
  group.add(cap);

  /* Legend plane on cap top face — bigger for readability */
  const lw = wide ? KEY_W*2+GAP-2*INSET : KEY_W-2*INSET;
  const lPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(lw, KEY_H-2*INSET),
    new THREE.MeshBasicMaterial({map:makeLabel(def.label, isGreen ? '#3a3a42' : '#ffffff'),transparent:true,depthWrite:true})
  );
  lPlane.position.set(0, 0, LBL_Z);
  cap.add(lPlane);

  /* Tiny LED indicator light on each key */
  const ledColor = isGreen ? 0x40ff60 : 0x8060ff;
  const ledMat = new THREE.MeshBasicMaterial({color:ledColor});
  const ledGeo = new THREE.CircleGeometry(.028, 8);
  const led = new THREE.Mesh(ledGeo, ledMat);
  led.position.set(lw*.38, -(KEY_H-2*INSET)*.32, LBL_Z+.001);
  cap.add(led);
  /* Tiny point light from the LED */
  const ledPt = new THREE.PointLight(ledColor, .06, .6, 2);
  ledPt.position.copy(led.position);
  ledPt.position.z += .03;
  cap.add(ledPt);

  const ko = {mesh:group, def, led, ledPt, baseX:x, baseY:y, baseZ:BASE_Z};
  keyObjects.push(ko);

  /* Invisible hit proxy (generous, covers rim + cap) */
  const hitW = wide ? KEY_W*2+GAP+.32 : KEY_W+.32;
  const hitProxy = new THREE.Mesh(
    new THREE.BoxGeometry(hitW, KEY_H+.30, KEY_D+RIM_D+.22),
    new THREE.MeshBasicMaterial({visible:false})
  );
  hitProxy.position.set(x, y, BASE_Z);
  calcGroup.add(hitProxy);
  hitMeshes.push(hitProxy);
  hitProxy.userData.ko = ko;
}

/* ── keyboard key → visual key lookup ── */
const keyToKo = new Map();
for(const ko of keyObjects){
  const d=ko.def;
  if(d.action==='num')  keyToKo.set(d.arg, ko);
  if(d.action==='dot')  keyToKo.set('.', ko);
  if(d.action==='eq')   { keyToKo.set('Enter',ko); keyToKo.set('=',ko); }
  if(d.action==='ac')   keyToKo.set('Escape',ko);
  if(d.action==='pct')  keyToKo.set('%',ko);
  if(d.action==='op'){
    if(d.arg==='+') keyToKo.set('+',ko);
    if(d.arg==='−') keyToKo.set('-',ko);
    if(d.arg==='×') keyToKo.set('*',ko);
    if(d.arg==='÷') keyToKo.set('/',ko);
  }
}

/* flat FFC ribbon — continuous ExtrudeGeometry along a spline */
function makeRibbon(pts, ribbonW, ribbonH, mat){
  const curve = new THREE.CatmullRomCurve3(pts);
  const shape = new THREE.Shape();
  shape.moveTo(-ribbonW/2, -ribbonH/2);
  shape.lineTo( ribbonW/2, -ribbonH/2);
  shape.lineTo( ribbonW/2,  ribbonH/2);
  shape.lineTo(-ribbonW/2,  ribbonH/2);
  shape.closePath();
  const geo = new THREE.ExtrudeGeometry(shape, {
    steps: 48,
    extrudePath: curve,
    bevelEnabled: false,
  });
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = true;
  return m;
}

/* centered C-curve ribbon between display bottom and keyboard top */

  new THREE.Vector3( 0.0, DP_Y-DP_H/2+.12,    0),           /* penetrates into display body */
  new THREE.Vector3( 0.0, DP_Y-DP_H/2,        -DP_D/2),     /* display bottom edge */
  new THREE.Vector3( 0.0, DP_Y-DP_H/2-.22,    -0.40),

  new THREE.Vector3( 0.0, KB_Y+KB_H/2+.16,    -0.38),

function makeTube(pts,r,mat,seg=45){
  const geo=new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),seg,r,8,false);
  const m=new THREE.Mesh(geo,mat);
  m.castShadow=true;
  m._curvePts=pts; m._tubeR=r; m._tubeSeg=seg; /* stored for rebuild after pivot */
  return m;
}

const antBaseMat=new THREE.MeshPhysicalMaterial({color:0x1a1a22,metalness:.7,roughness:.25});
const antSilverMat=new THREE.MeshPhysicalMaterial({color:0xc8ccd4,metalness:.88,roughness:.10,clearcoat:.6});
const antLedMats=[
  new THREE.MeshBasicMaterial({color:0xff2244}),
  new THREE.MeshBasicMaterial({color:0x22ccff}),
  new THREE.MeshBasicMaterial({color:0x44ff66}),
];
const _antLeds=[], _antBases=[];

function makeAntennaBase(x,y,z){
  const g=new THREE.Group();
  /* Dark floating sphere base */
  const sphere=new THREE.Mesh(new THREE.SphereGeometry(1.2,24,24),antBaseMat);
  g.add(sphere);
  /* Silver equator ring */
  const ring=new THREE.Mesh(new THREE.TorusGeometry(1.25,.06,8,32),antSilverMat);
  g.add(ring);
  /* Vertical silver pole from top of sphere */
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(.06,.05,2.2,8),antSilverMat);
  pole.position.y=2.2; g.add(pole);
  /* Parabolic dish on top */
  const dishPts=[];
  for(let i=0;i<=16;i++){
    const t=i/16;
    const r=t*1.0;
    const h=t*t*.6;
    dishPts.push(new THREE.Vector2(r,h));
  }
  const dish=new THREE.Mesh(new THREE.LatheGeometry(dishPts,24),antSilverMat);
  dish.position.y=3.0;
  dish.rotation.x=Math.PI*.06;
  g.add(dish);
  /* LED emitters around top of dish */
  const ledAngles=[0, Math.PI*2/3, Math.PI*4/3];
  ledAngles.forEach((a,i)=>{
    const lr=.45;
    const led=new THREE.Mesh(new THREE.SphereGeometry(.09,8,8),antLedMats[i%3]);
    led.position.set(Math.cos(a)*lr, 3.55, Math.sin(a)*lr);
    g.add(led);
    _antLeds.push(led);
    const glow=new THREE.PointLight(antLedMats[i%3].color,.4,2.5);
    glow.position.copy(led.position);
    g.add(glow);
    _antLeds.push(glow);
  });
  /* Small top emitter beacon */
  const beacon=new THREE.Mesh(new THREE.SphereGeometry(.06,8,8),new THREE.MeshBasicMaterial({color:0xffffff}));
  beacon.position.y=3.7; g.add(beacon);
  const beaconGlow=new THREE.PointLight(0xffffff,.3,2.0);
  beaconGlow.position.y=3.7; g.add(beaconGlow);
  _antLeds.push(beacon); _antLeds.push(beaconGlow);

  g.position.set(x,y,z);
  _antBases.push(g);
  return g;
}

/* ═══════════════════════════════════════
   SEPARATE DISPLAY / KEYBOARD PIVOTS
   Rigid elements → pivot groups (rotate with body)
   Cables stay in calcGroup but get geometry rebuilt
   so near-body endpoints follow the rotated ports
   while far-away floor endpoints stay put.
═══════════════════════════════════════ */
const HINGE_Y = 0.8;
const DP_ANGLE = 25 * Math.PI / 180;   // display tilts forward
const KB_ANGLE = -20 * Math.PI / 180;  // keyboard tilts back

const dpPivot = new THREE.Group();
dpPivot.position.y = HINGE_Y;
dpPivot.rotation.x = DP_ANGLE;

const kbPivot = new THREE.Group();
kbPivot.position.y = HINGE_Y;
kbPivot.rotation.x = KB_ANGLE;

/* Phase 1 — Move rigid elements into pivots (skip cables & ribbon) */
const _snap = [...calcGroup.children];
for (const ch of _snap) {
  if (cables.includes(ch) || ch._ribbon || ch._antenna) continue;  // cables/ribbon rebuilt in Phase 2, antennas stay in calcGroup
  const origY = ch.position.y;
  ch.position.y -= HINGE_Y;
  if (origY > HINGE_Y || ch._dp) {
    dpPivot.add(ch);     // display-related
  } else {
    kbPivot.add(ch);     // keyboard-related
  }
}
calcGroup.add(dpPivot);
calcGroup.add(kbPivot);

/* Phase 2 — Rebuild cable TubeGeometry with rotated near-body points
   Points close to the body rotate with the pivot;
   points on the floor stay put; in-between points blend smoothly. */
function _rotPt(p, angle) {
  const y = p.y - HINGE_Y, z = p.z;
  return new THREE.Vector3(
    p.x,
    y * Math.cos(angle) - z * Math.sin(angle) + HINGE_Y,
    y * Math.sin(angle) + z * Math.cos(angle)
  );
}
for (const c of cables) {
  const angle = c._dp ? DP_ANGLE : KB_ANGLE;
  const pts = c._curvePts;
  const newPts = pts.map(p => {
    /* Weight: 1 near body, fades to 0 beyond ~4 units from hinge */
    const dist = Math.abs(p.y - HINGE_Y);
    const w = Math.max(0, Math.min(1, 1 - (dist - 1.8) / 3.2));
    if (w < 0.001) return p.clone();
    return p.clone().lerp(_rotPt(p, angle), w);
  });
  const oldGeo = c.geometry;
  c.geometry = new THREE.TubeGeometry(
    new THREE.CatmullRomCurve3(newPts), c._tubeSeg, c._tubeR, 8, false
  );
  oldGeo.dispose();
}

/* Phase 3 — Rebuild ribbon so it bridges the two rotated panels.
   Top points rotate with display, bottom points with keyboard,
   middle points blend between the two. */
{
  const n = ribbonPts.length;
  const newRP = ribbonPts.map((p, i) => {
    const t = i / (n - 1);              // 0 → 1 (display-end → keyboard-end)
    const dpW = 1 - t;
    const kbW = t;
    const rpDp = _rotPt(p, DP_ANGLE);
    const rpKb = _rotPt(p, KB_ANGLE);
    return new THREE.Vector3(
      p.x,
      rpDp.y * dpW + rpKb.y * kbW,
      rpDp.z * dpW + rpKb.z * kbW
    );
  });
  const oldRG = ribbonMesh.geometry;
  const curve = new THREE.CatmullRomCurve3(newRP);
  const shape = new THREE.Shape();
  shape.moveTo(-.46/2, -.024/2);
  shape.lineTo( .46/2, -.024/2);
  shape.lineTo( .46/2,  .024/2);
  shape.lineTo(-.46/2,  .024/2);
  shape.closePath();
  ribbonMesh.geometry = new THREE.ExtrudeGeometry(shape, {
    steps: 48, extrudePath: curve, bevelEnabled: false,
  });
  oldRG.dispose();
}

/* ═══════════════════════════════════════
   KEY PRESS ANIMATIONS
═══════════════════════════════════════ */
const pressMap = new Map();
function kickKey(ko){ pressMap.set(ko,{t:0}); }
/* ── Press weight effect ── */
let _pressWeight=0;   // 0..1, decays over time
let _pressDir=0;      // -1 left, +1 right — subtle tilt toward pressed key
function triggerPressWeight(keyX){
  _pressWeight=1.0;
  _pressDir=keyX>0 ? 1 : keyX<0 ? -1 : 0;
}

function tickKeys(dt){
  for(const [ko,a] of pressMap){
    a.t+=dt*8;
    ko.mesh.position.z=ko.baseZ - Math.max(0,Math.sin(a.t*Math.PI))*.09;
    if(a.t>=1){ ko.mesh.position.z=ko.baseZ; pressMap.delete(ko); }
  }
}

/* ═══════════════════════════════════════
   CALCULATOR MATH
═══════════════════════════════════════ */
function smartRound(n){ return isFinite(n)?parseFloat(n.toPrecision(12)):'Error'; }
function compute(a,b,op){
  if(op==='÷') return b===0?'Error':smartRound(a/b);
  if(op==='×') return smartRound(a*b);
  if(op==='−') return smartRound(a-b);
  if(op==='+') return smartRound(a+b);
  return b;
}

/* ═══════════════════════════════════════
   BUTTON HANDLERS
═══════════════════════════════════════ */
function pressNum(n){
  sndDigit(parseInt(n));
  if(justEvaluated){ current=String(n); justEvaluated=false; expressionParts=[]; }
  else if(current==='0') current=String(n);
  else if(current.replace('-','').length<12) current+=String(n);
  displayDirty=true;
}
function pressDot(){
  sndDot();
  if(justEvaluated){ current='0.'; justEvaluated=false; expressionParts=[]; }
  else if(!current.includes('.')) current+='.';
  displayDirty=true;
}
function pressOp(op){
  sndOp(op);
  const val=parseFloat(current);
  if(stored!==null&&operator&&!justEvaluated){
    const r=compute(stored,val,operator);
    current=String(r);
    stored=r==='Error'?null:r;
  } else { stored=val; }
  expressionParts=[fmtDisp(current),op];
  operator=op; justEvaluated=true;
  displayDirty=true;
}
function pressEq(){
  if(operator===null) return;
  const b=parseFloat(current);
  expressionParts.push(fmtDisp(current)); expressionParts.push('=');
  const r=compute(stored,b,operator);
  sndResult(String(r));
  if(r==='Error') sndError();
  current=String(r); stored=null; operator=null; justEvaluated=true;
  currentFact=getFact(current); factRevealTime=clock.elapsedTime;
  scrGlow.intensity=2.2;
  /* trigger camera zoom */
  camState='zoomIn'; camT=0;
  controls.enabled=false;
  displayDirty=true;
}
function pressAC(){
  sndClear();
  current='0'; stored=null; operator=null; justEvaluated=false;
  expressionParts=[]; currentFact=null; factRevealTime=-999;
  /* cancel camera zoom if active */
  if(camState!=='idle'){ camState='idle'; controls.enabled=true; }
  displayDirty=true;
}
function pressSign(){
  sndFlip();
  if(current!=='0'&&current!=='Error')
    current=current.startsWith('-')?current.slice(1):'-'+current;
  displayDirty=true;
}
function pressPct(){
  sndPct();
  const v=parseFloat(current);
  if(isFinite(v)) current=String(smartRound(v/100));
  displayDirty=true;
}
function dispatch(def){
  if(def.action==='num')  pressNum(def.arg);
  else if(def.action==='dot')  pressDot();
  else if(def.action==='op')   pressOp(def.arg);
  else if(def.action==='eq')   pressEq();
  else if(def.action==='ac')   pressAC();
  else if(def.action==='sign') pressSign();
  else if(def.action==='pct')  pressPct();
}


/* ═══════════════════════════════════════
   RAYCASTING
═══════════════════════════════════════ */
const ray=new THREE.Raycaster();
const ptr=new THREE.Vector2();
function onDown(e){
  const rect=renderer.domElement.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  ptr.x= (cx-rect.left)/rect.width *2-1;
  ptr.y=-(cy-rect.top) /rect.height*2+1;
  ray.setFromCamera(ptr,camera);
  const hits=ray.intersectObjects(hitMeshes);
  if(hits.length){
    const ko=hits[0].object.userData.ko;
    if(ko){ kickKey(ko); dispatch(ko.def); triggerPressWeight(ko.mesh.position.x); controls.enabled=false; setTimeout(()=>controls.enabled=true,200); }
  }
}
renderer.domElement.addEventListener('pointerdown',onDown);

/* ═══════════════════════════════════════
   KEYBOARD INPUT
═══════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  /* animate the matching 3-D key on every physical keypress */
  const vk=keyToKo.get(e.key);
  if(vk){ kickKey(vk); triggerPressWeight(vk.mesh.position.x); }

  if(e.key>='0'&&e.key<='9') pressNum(e.key);
  else if(e.key==='.') pressDot();
  else if(e.key==='+') pressOp('+');
  else if(e.key==='-') pressOp('−');
  else if(e.key==='*') pressOp('×');
  else if(e.key==='/'){e.preventDefault();pressOp('÷');}
  else if(e.key==='Enter'||e.key==='=') pressEq();
  else if(e.key==='Escape') pressAC();
  else if(e.key==='Backspace'){
    current=current.length>1?current.slice(0,-1):'0';
    displayDirty=true;
  }
  else if(e.key==='%') pressPct();
});

/* ═══════════════════════════════════════
   RESIZE
═══════════════════════════════════════ */
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.fov=calcFOV();
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});

/* ═══════════════════════════════════════
   ANIMATION LOOP
═══════════════════════════════════════ */
let _firstFrame=true;
function animate(){
  requestAnimationFrame(animate);
  if(_firstFrame){ clock.start(); _firstFrame=false; }
  const dt=clock.getDelta();
  const t=clock.elapsedTime;

  /* press weight decay */
  if(_pressWeight>0.001){
    _pressWeight*=Math.pow(.04,dt); // fast exponential decay
  } else { _pressWeight=0; }
  const pw=_pressWeight;

  /* gentle float + side-axis tilt + permanent Z tilt + press weight */
  calcGroup.position.y=Math.sin(t*.65)*.20 - pw*.12;                       // dip down
  calcGroup.rotation.z=0.038+Math.sin(t*.38)*.016 + _pressDir*pw*.018;     // slight roll toward pressed side
  calcGroup.rotation.y=Math.sin(t*.22)*.038;
  calcGroup.rotation.x=-40*Math.PI/180 + Math.sin(t*.48)*.022 + pw*.025;   // slight forward tilt

  /* cable sway – very subtle, no rotation to avoid disconnecting from plugs */
  for(let i=0;i<cables.length;i++){
    const c=cables[i];
    const f=.35+i*.14;
    /* only tiny Y bob – no rotation that would swing endpoints away from plugs */
    c.position.y=Math.sin(t*(f*1.25)+i*.9)*.006;
  }

  /* glow pulse */
  scrGlow.intensity=Math.max(.4,scrGlow.intensity*.88)+Math.sin(t*1.7)*.07;
  ledGlow.intensity=.35+Math.sin(t*3.1)*.15;

  /* antenna floating bob + LED emitter pulse */
  for(let i=0;i<_antBases.length;i++){
    _antBases[i].position.y=-10.0+Math.sin(t*.8+i*2.0)*.3;
    _antBases[i].rotation.y=t*.15+i*Math.PI;
  }
  for(let i=0;i<_antLeds.length;i+=2){
    const mesh=_antLeds[i], glow=_antLeds[i+1];
    const pulse=.6+.4*Math.sin(t*2.5+i*1.1);
    mesh.material.opacity=pulse;
    mesh.material.transparent=true;
    glow.intensity=pulse*.6;
  }

  /* 4 status LED blink — each with different rhythm */
  const _ledFreqs=[1.2, 2.1, 0.7, 3.3];
  for(let i=0;i<4;i++){
    const on = Math.sin(t*_ledFreqs[i]+i*1.5) > 0.1;
    _ledMeshes[i].material.opacity = on ? 1 : .15;
    _ledMeshes[i].material.transparent = true;
    _ledGlows[i].intensity = on ? .25 : 0;
  }

  tickKeys(dt);
  drawDisplay();

  /* ── Camera intro animation ── */
  if(!introDone){
    introT+=dt;
    const ip=easeIO(Math.min(1,introT/INTRO_DUR));
    camera.position.lerpVectors(introSP,introEP,ip);
    controls.target.lerpVectors(introST,introET,ip);
    if(introT>=INTRO_DUR){
      introDone=true;
      controls.enabled=true;
      camera.position.copy(introEP);
      controls.target.copy(introET);
    }
  }


  /* ── Camera zoom state machine ── */
  if(camState!=='idle'&&introDone){
    camT+=dt;
    /* Home & zoom positions (account for floating calcGroup offset) */
    const homePos=new THREE.Vector3(3,2.5,12);
    const homeTgt=new THREE.Vector3(0,0,0);
    const zoomPos=new THREE.Vector3(0,2.0,6.5);
    const zoomTgt=new THREE.Vector3(0,1.8,0);
    if(camState==='zoomIn'){
      const p=smoothstep(camT/CAM_DUR_IN);
      camera.position.lerpVectors(homePos,zoomPos,p);
      controls.target.lerpVectors(homeTgt,zoomTgt,p);
      if(camT>=CAM_DUR_IN){ camState='hold'; camT=0; }
    } else if(camState==='hold'){
      camera.position.copy(zoomPos);
      controls.target.copy(zoomTgt);
      if(camT>=CAM_DUR_HOLD){ camState='zoomOut'; camT=0; }
    } else if(camState==='zoomOut'){
      const p=smoothstep(camT/CAM_DUR_OUT);
      camera.position.lerpVectors(zoomPos,homePos,p);
      controls.target.lerpVectors(zoomTgt,homeTgt,p);
      if(camT>=CAM_DUR_OUT){ camState='idle'; controls.enabled=true; }
    }
  }

  controls.update();
  composer.render();

  /* ── Typewriter intro text (DOM overlay) ── */
  if(!_introTextDone){
    let alpha=0, visText='';
    if(introT>=_TYPE_DELAY && introT<_TYPE_END){
      const nChars=Math.floor((introT-_TYPE_DELAY)/_TYPE_SPEED);
      visText=_introStr.slice(0,nChars); alpha=.88;
    } else if(introT>=_TYPE_END && introT<_HOLD_END){
      visText=_introStr; alpha=.88;
    } else if(introT>=_HOLD_END && introT<_FADE_END){
      visText=_introStr;
      alpha=.88*(1-(introT-_HOLD_END)/(_FADE_END-_HOLD_END));
    } else if(introT>=_FADE_END){
      _introTextDone=true; _tDiv.remove();
    }
    if(!_introTextDone) _drawTypeText(visText,alpha);
  }
}
animate();
</script>
